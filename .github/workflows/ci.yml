name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Lint — syntax errors / undefined names (fatal)
        run: flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint — style (non-fatal)
        run: flake8 src tests --count --exit-zero --max-line-length=120 --statistics

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          CLOUDHAWK_SECRET_KEY: ci-test-secret
        run: pytest tests/ -v --cov=src --cov-report=term-missing

  docker-build-check:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (validate Dockerfile, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployment/Dockerfile
          push: false
          tags: cloudhawk:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
