frameworks:

  ###############################################################
  # CIS Controls v8
  ###############################################################
  - id: CIS
    name: "CIS Controls v8"
    controls:

      - id: "CIS-1"
        title: "Inventory and Control of Enterprise Assets"
        description: "Actively manage all enterprise assets connected to infrastructure."
        category: "Asset Management"
        severity: MEDIUM
        rule_ids:
          - GCP-ASSET-001
          - COLLECT-001
          - COLLECT-002
          - COLLECT-003

      - id: "CIS-3"
        title: "Data Protection"
        description: "Develop processes and controls to identify, classify, securely handle, retain, and dispose of data."
        category: "Data Protection"
        severity: HIGH
        rule_ids:
          - S3-ENC-001
          - S3-PAB-001
          - S3-PAB-002
          - S3-POL-001
          - S3-POL-002
          - S3-ACL-001
          - GCP-STOR-001
          - GCP-STOR-002
          - GCP-STORAGE-001
          - GCP-STORAGE-002
          - GCP-STORAGE-003
          - AZURE-STOR-001
          - AZURE-STOR-002
          - AZURE-STOR-003
          - AZURE-STORAGE-001
          - AZURE-STORAGE-002
          - AZURE-STORAGE-003
          - AZURE-STORAGE-004

      - id: "CIS-4"
        title: "Secure Configuration of Enterprise Assets and Software"
        description: "Establish and maintain the secure configuration of enterprise assets and software."
        category: "Secure Configuration"
        severity: HIGH
        rule_ids:
          - EC2-SG-001
          - EC2-SG-002
          - EC2-SG-003
          - EC2-SG-004
          - EC2-SG-005
          - EC2-INST-001
          - EC2-INST-002
          - GCP-COMPUTE-001
          - GCP-COMPUTE-002
          - GCP-COMPUTE-003
          - AZURE-VM-001
          - AZURE-VM-002
          - AZURE-VM-003
          - AZURE-KV-001
          - AZURE-KV-002

      - id: "CIS-5"
        title: "Account Management"
        description: "Use processes and tools to assign and manage authorisation to credentials for user accounts."
        category: "Account Management"
        severity: HIGH
        rule_ids:
          - IAM-USER-001
          - IAM-USER-002
          - IAM-USER-003
          - IAM-USER-004
          - IAM-ACCOUNT-001
          - IAM-ACCOUNT-002
          - IAM-ACCOUNT-003
          - IAM-ROLE-001
          - IAM-ROLE-002
          - CT-MFA-001
          - CT-ROOT-001
          - GCP-IAM-001
          - GCP-IAM-002
          - GCP-IAM-003

      - id: "CIS-6"
        title: "Access Control Management"
        description: "Use processes and tools to create, assign, manage, and revoke access credentials and privileges."
        category: "Access Control"
        severity: HIGH
        rule_ids:
          - IAM-USER-001
          - IAM-USER-002
          - IAM-ROLE-001
          - IAM-ROLE-002
          - IAM-ACCOUNT-001
          - CT-MFA-001
          - GCP-IAM-001
          - GCP-IAM-002
          - GCP-IAM-003
          - AZURE-ACT-001
          - AZURE-ACT-002
          - AZURE-ACT-003
          - AZURE-ACT-004

      - id: "CIS-8"
        title: "Audit Log Management"
        description: "Collect, alert, review, and retain audit logs of events that could help detect, understand, or recover from an attack."
        category: "Audit Logging"
        severity: HIGH
        rule_ids:
          - CT-LOG-001
          - CT-ACTION-001
          - CT-HIGH-001
          - GCP-AUDIT-001
          - GCP-AUDIT-002
          - GCP-AUDIT-003
          - GCP-AUDIT-004
          - GCP-AUDIT-005
          - AZURE-ACT-001
          - AZURE-ACT-002
          - AZURE-ACT-003
          - AZURE-ACT-004

      - id: "CIS-10"
        title: "Malware Defenses"
        description: "Prevent or control the installation, spread, and execution of malicious applications, code, or scripts."
        category: "Threat Detection"
        severity: CRITICAL
        rule_ids:
          - GD-CRIT-001
          - GD-HIGH-001
          - GD-MED-001
          - GD-UNAUTH-001
          - GD-CRYPTO-001
          - GCP-SCC-001
          - GCP-SCC-002
          - AZURE-SCC-001
          - AZURE-SCC-002
          - AZURE-SEC-001
          - AZURE-SEC-002

  ###############################################################
  # SOC 2 Type II
  ###############################################################
  - id: SOC2
    name: "SOC 2 Type II"
    controls:

      - id: "CC6.1"
        title: "Logical and Physical Access Security"
        description: "Logical and physical access security controls are implemented to protect information assets."
        category: "Access Control"
        severity: HIGH
        rule_ids:
          - IAM-USER-001
          - IAM-USER-002
          - IAM-USER-003
          - IAM-USER-004
          - IAM-ACCOUNT-001
          - IAM-ACCOUNT-002
          - IAM-ACCOUNT-003
          - CT-MFA-001
          - GCP-IAM-001
          - GCP-IAM-002
          - GCP-IAM-003

      - id: "CC6.2"
        title: "System Credentials and Access Registration"
        description: "Prior to issuing system credentials the entity registers and authorises new users."
        category: "Identity Management"
        severity: HIGH
        rule_ids:
          - IAM-USER-001
          - IAM-USER-002
          - IAM-ACCOUNT-001
          - CT-ROOT-001
          - IAM-ROLE-001
          - IAM-ROLE-002

      - id: "CC6.3"
        title: "Access Removal and Modification"
        description: "Access is removed or modified based on employment status or job responsibility changes."
        category: "Identity Management"
        severity: MEDIUM
        rule_ids:
          - IAM-USER-003
          - IAM-USER-004
          - IAM-ACCOUNT-002
          - IAM-ACCOUNT-003

      - id: "CC7.1"
        title: "System Operations Monitoring"
        description: "Detection and monitoring procedures identify anomalies and security events."
        category: "Monitoring"
        severity: HIGH
        rule_ids:
          - CT-LOG-001
          - CT-ACTION-001
          - CT-HIGH-001
          - GCP-AUDIT-001
          - GCP-AUDIT-002
          - GCP-AUDIT-003
          - GCP-AUDIT-004
          - GCP-AUDIT-005
          - AZURE-ACT-001
          - AZURE-ACT-002
          - AZURE-ACT-003
          - AZURE-ACT-004

      - id: "CC7.2"
        title: "Threat and Vulnerability Detection"
        description: "The entity monitors system components for anomalies that could indicate malicious acts."
        category: "Threat Detection"
        severity: CRITICAL
        rule_ids:
          - GD-CRIT-001
          - GD-HIGH-001
          - GD-MED-001
          - GD-UNAUTH-001
          - GD-CRYPTO-001
          - GCP-SCC-001
          - GCP-SCC-002
          - AZURE-SCC-001
          - AZURE-SCC-002
          - AZURE-SEC-001
          - AZURE-SEC-002

      - id: "CC8.1"
        title: "Change Management"
        description: "Changes to infrastructure and software are authorised, tested, approved and documented."
        category: "Change Management"
        severity: MEDIUM
        rule_ids:
          - CT-HIGH-001
          - AZURE-ACT-002
          - AZURE-ACT-003
          - AZURE-ACT-004

      - id: "CC9.1"
        title: "Risk Mitigation"
        description: "The entity identifies, selects, and develops risk mitigation activities for risks arising from potential business disruptions."
        category: "Risk Management"
        severity: HIGH
        rule_ids:
          - EC2-SG-001
          - EC2-SG-002
          - EC2-SG-003
          - EC2-SG-004
          - EC2-SG-005
          - EC2-INST-001
          - EC2-INST-002
          - GCP-COMPUTE-001
          - GCP-COMPUTE-002
          - GCP-COMPUTE-003
          - AZURE-VM-001
          - AZURE-VM-002
          - AZURE-VM-003

      - id: "A1.1"
        title: "Availability — Current Processing Capacity"
        description: "The entity maintains current processing capacity sufficient to meet its objectives."
        category: "Availability"
        severity: MEDIUM
        rule_ids:
          - COLLECT-001
          - COLLECT-002
          - COLLECT-003

  ###############################################################
  # ISO 27001:2022
  ###############################################################
  - id: ISO27001
    name: "ISO/IEC 27001:2022"
    controls:

      - id: "5.15"
        title: "Access Control"
        description: "Rules to control physical and logical access to information and other associated assets shall be established and implemented."
        category: "Access Control"
        severity: HIGH
        rule_ids:
          - IAM-USER-001
          - IAM-USER-002
          - IAM-USER-003
          - IAM-USER-004
          - IAM-ACCOUNT-001
          - IAM-ACCOUNT-002
          - IAM-ACCOUNT-003
          - IAM-ROLE-001
          - IAM-ROLE-002
          - GCP-IAM-001
          - GCP-IAM-002
          - GCP-IAM-003
          - AZURE-ACT-001

      - id: "5.16"
        title: "Identity Management"
        description: "The full life cycle of identities shall be managed."
        category: "Identity Management"
        severity: HIGH
        rule_ids:
          - IAM-USER-001
          - IAM-USER-002
          - IAM-ACCOUNT-001
          - CT-ROOT-001
          - IAM-ROLE-001
          - IAM-ROLE-002

      - id: "5.17"
        title: "Authentication Information"
        description: "Allocation and management of authentication information shall be controlled by a management process."
        category: "Authentication"
        severity: HIGH
        rule_ids:
          - CT-MFA-001
          - IAM-USER-003
          - IAM-ACCOUNT-002
          - IAM-ACCOUNT-003

      - id: "5.18"
        title: "Access Rights"
        description: "Access rights to information and other associated assets shall be provisioned, reviewed, modified and removed."
        category: "Access Control"
        severity: HIGH
        rule_ids:
          - IAM-USER-004
          - IAM-ACCOUNT-003
          - IAM-ROLE-002
          - GCP-IAM-003
          - AZURE-ACT-003

      - id: "5.23"
        title: "Information Security for Use of Cloud Services"
        description: "Processes for acquisition, use, management and exit from cloud services shall be established."
        category: "Cloud Security"
        severity: HIGH
        rule_ids:
          - COLLECT-001
          - COLLECT-002
          - COLLECT-003
          - GCP-AUDIT-001
          - GCP-AUDIT-002
          - AZURE-ACT-001
          - AZURE-ACT-002

      - id: "8.3"
        title: "Information Access Restriction"
        description: "Access to information and other associated assets shall be restricted in accordance with the access control policy."
        category: "Data Protection"
        severity: HIGH
        rule_ids:
          - S3-ACL-001
          - S3-PAB-001
          - S3-PAB-002
          - S3-POL-001
          - S3-POL-002
          - GCP-STORAGE-001
          - GCP-STORAGE-002
          - AZURE-STORAGE-001
          - AZURE-STORAGE-002

      - id: "8.5"
        title: "Secure Authentication"
        description: "Secure authentication technologies and procedures shall be implemented."
        category: "Authentication"
        severity: HIGH
        rule_ids:
          - CT-MFA-001
          - CT-ROOT-001
          - IAM-USER-001
          - IAM-USER-002
          - GCP-IAM-001
          - AZURE-ACT-001

      - id: "8.12"
        title: "Data Leakage Prevention"
        description: "Data leakage prevention measures shall be applied to systems, networks and any other devices."
        category: "Data Protection"
        severity: HIGH
        rule_ids:
          - S3-ENC-001
          - S3-PAB-001
          - S3-PAB-002
          - GCP-STOR-001
          - GCP-STOR-002
          - GCP-STOR-003
          - GCP-STORAGE-003
          - AZURE-STOR-001
          - AZURE-STOR-002
          - AZURE-STORAGE-003
          - AZURE-STORAGE-004

      - id: "8.15"
        title: "Logging"
        description: "Logs that record activities, exceptions, faults and other relevant events shall be produced, stored, protected and analysed."
        category: "Audit Logging"
        severity: HIGH
        rule_ids:
          - CT-LOG-001
          - CT-ACTION-001
          - CT-HIGH-001
          - GCP-AUDIT-001
          - GCP-AUDIT-002
          - GCP-AUDIT-003
          - GCP-AUDIT-004
          - GCP-AUDIT-005
          - AZURE-ACT-001
          - AZURE-ACT-002
          - AZURE-ACT-003
          - AZURE-ACT-004

      - id: "8.16"
        title: "Monitoring Activities"
        description: "Networks, systems and applications shall be monitored for anomalous behaviour."
        category: "Monitoring"
        severity: HIGH
        rule_ids:
          - GD-CRIT-001
          - GD-HIGH-001
          - GD-MED-001
          - GD-UNAUTH-001
          - GD-CRYPTO-001
          - GCP-SCC-001
          - GCP-SCC-002
          - AZURE-SCC-001
          - AZURE-SCC-002
          - AZURE-SEC-001
          - AZURE-SEC-002

      - id: "8.20"
        title: "Networks Security"
        description: "Networks and network devices shall be secured, managed and controlled to protect information in systems and applications."
        category: "Network Security"
        severity: HIGH
        rule_ids:
          - EC2-SG-001
          - EC2-SG-002
          - EC2-SG-003
          - EC2-SG-004
          - EC2-SG-005
          - EC2-INST-001
          - EC2-INST-002
          - GCP-COMPUTE-001
          - GCP-COMPUTE-002
          - GCP-COMPUTE-003
          - AZURE-VM-001
          - AZURE-VM-002
          - AZURE-VM-003

      - id: "8.24"
        title: "Use of Cryptography"
        description: "Rules for the effective use of cryptography, including cryptographic key management, shall be defined and implemented."
        category: "Cryptography"
        severity: HIGH
        rule_ids:
          - S3-ENC-001
          - GCP-STOR-001
          - GCP-STOR-002
          - GCP-STORAGE-001
          - GCP-STORAGE-002
          - AZURE-STOR-001
          - AZURE-STOR-002
          - AZURE-STORAGE-001
          - AZURE-STORAGE-002
          - AZURE-KV-001
          - AZURE-KV-002
