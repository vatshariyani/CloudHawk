<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudHawk — Reset password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='cloudhawk.css') }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-ui);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .wrap { width: 100%; max-width: 400px; padding: 24px 16px; }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; justify-content: center; }
    .logo svg { color: var(--accent); }
    .logo-text { font-size: 22px; font-weight: 600; letter-spacing: -.3px; }
    .logo-text span { color: var(--accent); }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 32px; }
    .card h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 12.5px; color: var(--text-dim); margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px; }
    .field input { width: 100%; background: var(--bg-1); border: 1px solid var(--line);
      border-radius: 7px; color: var(--text); font-family: var(--font-ui); font-size: 13.5px;
      padding: 9px 12px; outline: none; transition: border-color .15s; }
    .field input:focus { border-color: var(--accent); }
    .pw-error { background: rgba(255,84,112,.12); border: 1px solid rgba(255,84,112,.35);
      border-radius: 7px; color: var(--sev-crit); font-size: 12.5px; padding: 9px 12px; margin-bottom: 16px; }
    .invalid-box { background: rgba(255,84,112,.12); border: 1px solid rgba(255,84,112,.35);
      border-radius: 7px; color: var(--sev-crit); font-size: 13px; padding: 14px 16px; line-height: 1.6; }
    .btn-submit { width: 100%; background: var(--accent); border: none; border-radius: 7px;
      color: #0a0c11; cursor: pointer; font-family: var(--font-ui); font-size: 13.5px;
      font-weight: 600; padding: 10px; margin-top: 8px; transition: background .15s; }
    .btn-submit:hover { background: var(--accent-hover); }
    .back { display: block; text-align: center; margin-top: 20px; font-size: 12.5px;
      color: var(--text-dim); text-decoration: none; }
    .back:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3l9 3v5c0 5-3.5 8-7 10-3.5-2-7-5-7-10V6z"/>
      </svg>
      <span class="logo-text">Cloud<span>Hawk</span></span>
    </div>

    <div class="card">
      <h1>Reset password</h1>

      {% if invalid %}
        <div class="invalid-box">
          This reset link is invalid or has expired.<br><br>
          Please <a href="/forgot-password" style="color:var(--accent)">request a new one</a>.
        </div>
      {% else %}
        <p class="sub">Choose a new password (min 6 characters).</p>
        {% if error %}<div class="pw-error">{{ error }}</div>{% endif %}
        <form method="post" action="/reset-password/{{ token }}">
          <div class="field">
            <label>New password</label>
            <input type="password" name="new_password" autocomplete="new-password" autofocus required>
          </div>
          <div class="field">
            <label>Confirm new password</label>
            <input type="password" name="confirm_password" autocomplete="new-password" required>
          </div>
          <button type="submit" class="btn-submit">Set new password</button>
        </form>
      {% endif %}
    </div>

    <a href="/login" class="back">← Back to sign in</a>
  </div>
</body>
</html>
