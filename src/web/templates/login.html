<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudHawk — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='cloudhawk.css') }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px 16px;
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .login-logo svg { color: var(--accent); }
    .login-logo-text {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -.3px;
    }
    .login-logo-text span { color: var(--accent); }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 32px;
    }
    .login-card h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 12.5px;
      color: var(--text-dim);
      margin-bottom: 28px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13.5px;
      padding: 9px 12px;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--text-dim); }
    .login-error {
      background: rgba(255, 84, 112, .12);
      border: 1px solid rgba(255, 84, 112, .35);
      border-radius: 7px;
      color: var(--sev-crit);
      font-size: 12.5px;
      padding: 9px 12px;
      margin-bottom: 16px;
    }
    .btn-login {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 7px;
      color: #0a0c11;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: 13.5px;
      font-weight: 600;
      padding: 10px;
      margin-top: 8px;
      transition: background .15s;
    }
    .btn-login:hover { background: var(--accent-hover); }
    .login-hint {
      margin-top: 20px;
      text-align: center;
      font-size: 11.5px;
      color: var(--text-dim);
    }
    .login-hint code {
      font-family: var(--font-mono);
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 1px 5px;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3l9 3v5c0 5-3.5 8-7 10-3.5-2-7-5-7-10V6z"/>
      </svg>
      <span class="login-logo-text">Cloud<span>Hawk</span></span>
    </div>

    <div class="login-card">
      <h1>Sign in</h1>
      <p class="login-sub">Multi-cloud security console</p>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="admin"
                 value="{{ username or '' }}" autocomplete="username" autofocus required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••"
                 autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login">Sign in</button>
      </form>

      <p class="login-hint">
        Set credentials via env vars<br>
        <code>CLOUDHAWK_USER</code> &nbsp;/&nbsp; <code>CLOUDHAWK_PASSWORD</code>
      </p>
    </div>
  </div>
</body>
</html>
