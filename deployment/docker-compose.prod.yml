version: '3.8'

services:
  cloudhawk:
    image: ghcr.io/${GITHUB_REPOSITORY:-vatshariyani/cloudhawk}:latest
    container_name: cloudhawk
    ports:
      - "${CLOUDHAWK_PORT:-5000}:5000"
    environment:
      - CLOUDHAWK_PORT=${CLOUDHAWK_PORT:-5000}
      - CLOUDHAWK_HOST=0.0.0.0
      - PYTHONUNBUFFERED=1
      - FLASK_DEBUG=0
      - CLOUDHAWK_SECRET_KEY=${CLOUDHAWK_SECRET_KEY:?CLOUDHAWK_SECRET_KEY must be set}
      # AWS credentials — set via environment, never hardcode
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID must be set}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY must be set}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      # Azure (optional)
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      # GCP (optional)
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/cloudhawk/config/gcp-credentials.json
    volumes:
      - cloudhawk_logs:/opt/cloudhawk/logs
      - cloudhawk_models:/opt/cloudhawk/src/detection/models
      - cloudhawk_alerts:/opt/cloudhawk/src/alerts
      - cloudhawk_config:/opt/cloudhawk/config
      - ${GCP_CREDENTIALS_PATH:-/dev/null}:/opt/cloudhawk/config/gcp-credentials.json:ro
    restart: unless-stopped
    # B13 fix: correct health check URL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - cloudhawk_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cloudhawk.rule=Host(`${CLOUDHAWK_DOMAIN:-cloudhawk.local}`)"
      - "traefik.http.services.cloudhawk.loadbalancer.server.port=5000"

  redis:
    image: redis:7-alpine
    container_name: cloudhawk_redis
    # Redis should NOT be exposed to the host in production
    expose:
      - "6379"
    volumes:
      - cloudhawk_redis:/data
    restart: unless-stopped
    networks:
      - cloudhawk_network
    # B14 fix: require password — empty default not allowed
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}

  postgres:
    image: postgres:15-alpine
    container_name: cloudhawk_postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cloudhawk}
      - POSTGRES_USER=${POSTGRES_USER:-cloudhawk}
      # B15 fix: no hardcoded fallback password in production
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    expose:
      - "5432"
    volumes:
      - cloudhawk_postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - cloudhawk_network

  nginx:
    image: nginx:alpine
    container_name: cloudhawk_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ${SSL_CERT_PATH:?SSL_CERT_PATH must be set}:/etc/nginx/ssl/cloudhawk.crt:ro
      - ${SSL_KEY_PATH:?SSL_KEY_PATH must be set}:/etc/nginx/ssl/cloudhawk.key:ro
    # B16 fix: wait for cloudhawk to be healthy before nginx accepts traffic
    depends_on:
      cloudhawk:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cloudhawk_network

volumes:
  cloudhawk_logs:
  cloudhawk_models:
  cloudhawk_alerts:
  cloudhawk_config:
  cloudhawk_redis:
  cloudhawk_postgres:

networks:
  cloudhawk_network:
    driver: bridge
