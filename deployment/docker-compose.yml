version: '3.8'

services:
  cloudhawk:
    # B8 fix: specify both context (repo root) and dockerfile path
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: cloudhawk
    ports:
      - "5000:5000"
    environment:
      - CLOUDHAWK_PORT=5000
      - CLOUDHAWK_HOST=0.0.0.0
      - PYTHONUNBUFFERED=1
      # B11 fix: FLASK_ENV deprecated — use FLASK_DEBUG
      - FLASK_DEBUG=0
      - CLOUDHAWK_SECRET_KEY=${CLOUDHAWK_SECRET_KEY:?CLOUDHAWK_SECRET_KEY must be set}
    volumes:
      - cloudhawk_logs:/opt/cloudhawk/logs
      - cloudhawk_models:/opt/cloudhawk/src/detection/models
      - cloudhawk_alerts:/opt/cloudhawk/src/alerts
      - cloudhawk_config:/opt/cloudhawk/config
    restart: unless-stopped
    # B3 fix: correct health check URL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # B12 fix: declare dependency so cloudhawk waits for redis
    depends_on:
      redis:
        condition: service_started
    networks:
      - cloudhawk_network

  redis:
    image: redis:7-alpine
    container_name: cloudhawk_redis
    # B10 fix: bind to localhost only in dev, require a password
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - cloudhawk_redis:/data
    restart: unless-stopped
    networks:
      - cloudhawk_network
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}

  postgres:
    image: postgres:15-alpine
    container_name: cloudhawk_postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cloudhawk}
      - POSTGRES_USER=${POSTGRES_USER:-cloudhawk}
      # B9 fix: no hardcoded password — require env var
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - cloudhawk_postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - cloudhawk_network

volumes:
  cloudhawk_logs:
  cloudhawk_models:
  cloudhawk_alerts:
  cloudhawk_config:
  cloudhawk_redis:
  cloudhawk_postgres:

networks:
  cloudhawk_network:
    driver: bridge
